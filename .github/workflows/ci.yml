name : Train model pipeline

on:
  push:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: run the test
        run: |
          python train.py

